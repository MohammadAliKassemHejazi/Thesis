# Global configuration
global:
  imagePullPolicy: IfNotPresent

# Product Service Configuration
productService:
  name: product-service
  image:
    repository: product-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: true
    host: product.local
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Translation Service Configuration
translationService:
  name: translation-service
  image:
    repository: translation-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3001
  ingress:
    enabled: true
    host: translation.local
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi  # PyTorch models might need more
    requests:
      cpu: 200m
      memory: 512Mi

# Product Database Configuration
productDb:
  name: product-db
  image:
    repository: postgres
    tag: 15-alpine
  service:
    port: 5432
  persistence:
    enabled: true
    size: 1Gi
    storageClass: standard  # Or leave empty for default
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  credentials:
    username: product_user
    password: product_pass  # In production, use external secrets management
    database: products_db

# Translation Database Configuration
translationDb:
  name: translation-db
  image:
    repository: postgres
    tag: 15-alpine
  service:
    port: 5432
  persistence:
    enabled: true
    size: 1Gi
    storageClass: standard
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  credentials:
    username: translation_user
    password: translation_pass
    database: translations_db

# Ingress Controller Configuration (for reference in README, usually handled by cluster admin or separate chart)
ingress:
  className: nginx
