apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.productService.name }}
  labels:
    app: {{ .Values.productService.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.productService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.productService.name }}
    spec:
      containers:
        - name: {{ .Values.productService.name }}
          image: "{{ .Values.productService.image.repository }}:{{ .Values.productService.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.productService.service.port }}
          envFrom:
            - configMapRef:
                name: product-service-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: product-db-secret
                  key: password
          resources:
            requests:
              cpu: {{ .Values.productService.resources.requests.cpu }}
              memory: {{ .Values.productService.resources.requests.memory }}
            limits:
              cpu: {{ .Values.productService.resources.limits.cpu }}
              memory: {{ .Values.productService.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.productService.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.productService.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.productService.name }}
spec:
  selector:
    app: {{ .Values.productService.name }}
  ports:
    - protocol: TCP
      port: {{ .Values.productService.service.port }}
      targetPort: {{ .Values.productService.service.port }}
  type: {{ .Values.productService.service.type }}
