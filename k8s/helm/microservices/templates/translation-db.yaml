apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.translationDb.name }}
  labels:
    app: {{ .Values.translationDb.name }}
spec:
  ports:
    - port: {{ .Values.translationDb.service.port }}
      name: postgres
  selector:
    app: {{ .Values.translationDb.name }}
  clusterIP: None  # Headless service for StatefulSet identity

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.translationDb.name }}
spec:
  serviceName: {{ .Values.translationDb.name }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.translationDb.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.translationDb.name }}
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.translationDb.image.repository }}:{{ .Values.translationDb.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: {{ .Values.translationDb.credentials.username }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: translation-db-secret
                  key: password
            - name: POSTGRES_DB
              value: {{ .Values.translationDb.credentials.database }}
          resources:
            requests:
              cpu: {{ .Values.translationDb.resources.requests.cpu }}
              memory: {{ .Values.translationDb.resources.requests.memory }}
            limits:
              cpu: {{ .Values.translationDb.resources.limits.cpu }}
              memory: {{ .Values.translationDb.resources.limits.memory }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.translationDb.credentials.username }}
                - -d
                - {{ .Values.translationDb.credentials.database }}
            initialDelaySeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.translationDb.credentials.username }}
                - -d
                - {{ .Values.translationDb.credentials.database }}
            initialDelaySeconds: 10
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        {{- if .Values.translationDb.persistence.storageClass }}
        storageClassName: {{ .Values.translationDb.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.translationDb.persistence.size }}
