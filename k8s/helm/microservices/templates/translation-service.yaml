apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.translationService.name }}
  labels:
    app: {{ .Values.translationService.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.translationService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.translationService.name }}
    spec:
      containers:
        - name: {{ .Values.translationService.name }}
          image: "{{ .Values.translationService.image.repository }}:{{ .Values.translationService.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.translationService.service.port }}
          env:
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: translation-service-config
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: translation-db-secret
                  key: password
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: translation-service-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: translation-service-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: translation-service-config
                  key: DB_NAME
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASS)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: translation-service-secret
                  key: hfToken
          resources:
            requests:
              cpu: {{ .Values.translationService.resources.requests.cpu }}
              memory: {{ .Values.translationService.resources.requests.memory }}
            limits:
              cpu: {{ .Values.translationService.resources.limits.cpu }}
              memory: {{ .Values.translationService.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.translationService.service.port }}
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.translationService.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.translationService.name }}
spec:
  selector:
    app: {{ .Values.translationService.name }}
  ports:
    - protocol: TCP
      port: {{ .Values.translationService.service.port }}
      targetPort: {{ .Values.translationService.service.port }}
  type: {{ .Values.translationService.service.type }}
